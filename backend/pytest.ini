[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Live log output so failures show context immediately
log_cli            = true
log_cli_level      = DEBUG
log_cli_format     = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %H:%M:%S

# Markers used across test files
markers =
    unit:        Fast, pure-Python unit tests with no I/O
    integration: Tests that exercise multiple layers together (DB, HTTP)
    slow:        Tests that call real external APIs (skip with -m "not slow")
